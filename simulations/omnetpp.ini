[General]
sim-time-limit = 300s
repeat = 5
seed-set = ${repetition}

output-scalar-file  = results/${configname}-${runnumber}.sca
**.vector-recording = false
**.scalar-recording = true

**.mobility.initFromDisplayString = false

# ── Endereçamento e roteamento ───────────────────────────────────────────────
# AODV gerencia as rotas dinamicamente, sob demanda.
# Rotas estáticas, de sub-rede e padrão permanecem desativadas — o AODV
# as descobre sob demanda. Todos os nós usam uma única sub-rede /24 para
# que o RREQ alcance vizinhos em modo ad hoc multissaltos.
*.configurator.config = xml("<config><interface hosts='*' address='10.0.0.x' netmask='255.255.255.0'/></config>")
*.configurator.addStaticRoutes  = false
*.configurator.addSubnetRoutes  = false
*.configurator.addDefaultRoutes = false
**.ip.limitedBroadcast = true
# forwarding=true vem do AdhocHost (base do AodvRouter) — habilita repasse IP multi-hop

# ── AODV ─────────────────────────────────────────────────────────────────────
# activeRouteTimeout=5 s: em FANET com mobilidade alta, rotas envelhecem rápido.
# Equilibra overhead de redescoberta com validade da rota.
**.aodv.activeRouteTimeout = 5s

# ── Meio físico sem fio ───────────────────────────────────────────────────────
**.radioMedium.typename                         = "Ieee80211ScalarRadioMedium"
**.radioMedium.pathLoss.typename                = "FreeSpacePathLoss"
**.radioMedium.backgroundNoise.typename         = "IsotropicScalarBackgroundNoise"
**.radioMedium.backgroundNoise.power            = -100dBm

**.wlan[*].radio.typename                       = "Ieee80211ScalarRadio"
# Todos os nós usam IEEE 802.11 em modo ad hoc, 2,4 GHz.
# A comunicação multissaltos é realizada pelo AODV — não pelo IEEE 802.11s.
**.wlan[*].radio.carrierFrequency               = 2.4GHz
**.wlan[*].radio.bandwidth                      = 20MHz
**.wlan[*].radio.receiver.sensitivity           = -85dBm
**.wlan[*].radio.receiver.snirThreshold         = 4dB
**.wlan[*].radio.transmitter.datarate           = 6Mbps
# Potência definida por tipo de nó em cada Config (drone: 20 mW / equipe: 50 mW).

**.wlan[*].mac.typename                         = "Ieee80211Mac"
**.wlan[*].mgmt.typename                        = "Ieee80211MgmtAdhoc"
**.wlan[*].agent.typename                       = ""
# Buffer MAC: 50 pacotes — previne overflow sem jitter excessivo [SCI-2019]
**.wlan[*].mac.queue.packetCapacity             = 50

# ═══════════════════════════════════════════════════════════════════════════
# BasicTest — cenário principal: 15 UAVs + 5 embarcações, 5 km × 5 km
#
# Parâmetros alinhados com scenario_reference.md §3 [loor2026qos, panda2019uavwifi].
# A simulação não modela vítimas físicas nem detecção por sensor.
# Os UAVs geram eventos sintéticos de alerta para avaliar comunicação FANET.
#
# Potência: 20 mW UAV / 50 mW equipe [panda2019uavwifi].
# Alcance efetivo em espaço livre: ≈ 700–800 m UAV–UAV, ≈ 1200 m equipe.
# O artigo de referência observou 280–290 m em protótipo real; esta simulação
# usa alcance maior para viabilizar conectividade em 25 km² com 15 UAVs.
# k̄ = (N-1)·π·r²/A ≈ 1,1 para N=15, r=788 m, A=25×10⁶ m² (rede esparsa).
#
# sim-time-limit=900s é a avaliação principal.
# Use BasicTest_Piloto para testes rápidos de 300 s.
# ═══════════════════════════════════════════════════════════════════════════
[Config BasicTest]
network         = echosar.simulations.BasicNetwork
description     = "Cenário principal: 15 UAVs, 5 equipes, 5 km × 5 km — eventos sintéticos de alerta"
sim-time-limit  = 900s
*.numDrones     = 15
*.numTeams      = 5

# ── Potência por tipo de nó [panda2019uavwifi] ───────────────────────────────
**.drone[*].wlan[*].radio.transmitter.power   = 20mW
**.team[*].wlan[*].radio.transmitter.power    = 50mW

# ── UAVs: mobilidade Gauss-Markov, altitude variável 80–120 m ────────────────
**.drone[*].mobility.typename             = "GaussMarkovMobility"
**.drone[*].mobility.alpha                = 0.75
**.drone[*].mobility.speed                = uniform(8mps, 15mps)
**.drone[*].mobility.speedStdDev          = 0mps
**.drone[*].mobility.angleStdDev          = 30deg
**.drone[*].mobility.margin               = 100m
**.drone[*].mobility.constraintAreaMinX   = 0m
**.drone[*].mobility.constraintAreaMaxX   = 5000m
**.drone[*].mobility.constraintAreaMinY   = 0m
**.drone[*].mobility.constraintAreaMaxY   = 5000m
**.drone[*].mobility.constraintAreaMinZ   = 80m
**.drone[*].mobility.constraintAreaMaxZ   = 120m

# ── Aplicação dos UAVs ────────────────────────────────────────────────────────
# Eventos sintéticos de alerta — não há vítima física nem sensor de detecção.
# O parâmetro victimInterval controla a taxa de geração de tráfego de missão.
**.drone[*].app[0].victimInterval         = 40s
**.drone[*].app[0].teamTimeout            = 30s
**.drone[*].app[0].retryInterval          = 10s
**.drone[*].app[0].maxRetries             = 5

# ── Embarcações: patrulhamento sintético em área alagada ─────────────────────
# Como o foco é comunicação, não há deslocamento até vítimas físicas.
# RandomWaypoint representa mobilidade operacional simplificada dos barcos.
**.team[*].mobility.typename              = "RandomWaypointMobility"
**.team[*].mobility.speed                 = uniform(1.5mps, 3.0mps)
**.team[*].mobility.waitTime              = uniform(5s, 20s)
**.team[*].mobility.constraintAreaMinX    = 0m
**.team[*].mobility.constraintAreaMaxX    = 5000m
**.team[*].mobility.constraintAreaMinY    = 0m
**.team[*].mobility.constraintAreaMaxY    = 5000m
**.team[*].mobility.initialZ              = 1.5m
**.team[*].mobility.constraintAreaMinZ    = 1.5m
**.team[*].mobility.constraintAreaMaxZ    = 1.5m
# 4 cantos + centro (5 km × 5 km)
**.team[0].mobility.initialX              = 750m    # SW
**.team[0].mobility.initialY              = 4250m
**.team[1].mobility.initialX              = 4250m   # NE
**.team[1].mobility.initialY              = 750m
**.team[2].mobility.initialX              = 4250m   # SE
**.team[2].mobility.initialY              = 4250m
**.team[3].mobility.initialX              = 750m    # NW
**.team[3].mobility.initialY              = 750m
**.team[4].mobility.initialX              = 2500m   # Centro
**.team[4].mobility.initialY              = 2500m

# ── Visualização ─────────────────────────────────────────────────────────────
*.visualizer.mediumVisualizer.displayCommunicationRanges  = true
*.visualizer.mediumVisualizer.communicationRangeLineColor = "blue"
*.visualizer.mediumVisualizer.communicationRangeLineStyle = "dashed"
*.visualizer.mediumVisualizer.communicationRangeLineWidth = 1

# ── Aplicação das equipes ────────────────────────────────────────────────────
**.team[0].app[0].myTeamId                = "team0"
**.team[1].app[0].myTeamId                = "team1"
**.team[2].app[0].myTeamId                = "team2"
**.team[3].app[0].myTeamId                = "team3"
**.team[4].app[0].myTeamId                = "team4"
**.team[*].app[0].sendInterval            = 1s
# Velocidade nominal usada pela aplicação para estimativas lógicas de ocupação.
# Corresponde à média da mobilidade uniform(1.5, 3.0) m/s.
**.team[*].app[0].teamSpeed               = 2.25mps
# Tempo de indisponibilidade lógica da equipe após aceitar um alerta.
# Não representa atendimento físico; modela ocupação operacional na simulação.
**.team[*].app[0].serviceTime             = 120s

# ═══════════════════════════════════════════════════════════════════════════
# BasicTest_Piloto — validação funcional, 300 s.
# Herda todos os parâmetros do BasicTest (15 UAVs, 5 equipes, 5 km × 5 km).
#
# NÃO é resultado principal da dissertação. Serve para confirmar que a
# arquitetura de comunicação funciona (PDR/AppACK observáveis, retransmissões
# e expirados em proporções razoáveis) antes de executar os 900 s finais.
#
# Interpretação do resultado 7,1% de alertas com equipe disponível:
# não é falha de rede — é saturação da camada de aplicação causada pela
# relação alertInterval=40s × serviceTime=120s × 15 UAVs × 5 equipes.
# ═══════════════════════════════════════════════════════════════════════════
[Config BasicTest_Piloto]
extends        = BasicTest
description    = "Piloto funcional: 15 UAVs, 5 equipes — 300 s (validação, não resultado final)"
sim-time-limit = 300s

# ═══════════════════════════════════════════════════════════════════════════
# ── EXPERIMENTOS PRINCIPAIS ─────────────────────────────────────────────────
#
# Comparação controlada: mesma rede, mesmos UAVs, mesmas equipes, mesma
# geração de alertas, mesma mobilidade e mesmas seeds.
# ÚNICA diferença: presença ou ausência de obstáculos físicos.
#
# Isso permite atribuir diferenças de PDR/AppACK/atraso/retransmissões
# exclusivamente ao efeito dos obstáculos — sem confundidor de densidade
# de nós, carga de alertas ou parâmetros de mobilidade.
#
#   Cenario_SemObstaculos → baseline da FANET
#   Cenario_ComObstaculos → degradação por obstrução física (DielectricObstacleLoss)
# ═══════════════════════════════════════════════════════════════════════════

[Config Cenario_SemObstaculos]
extends     = BasicTest
description = "Principal: 15 UAVs, 5 equipes, 5 km × 5 km — sem obstáculos (baseline FANET)"

[Config Cenario_ComObstaculos]
extends     = BasicTest
description = "Principal: 15 UAVs, 5 equipes, 5 km × 5 km — com obstáculos urbanos (DielectricObstacleLoss)"

# ── Limites do espaço físico ─────────────────────────────────────────────────
*.physicalEnvironment.spaceMinX = 0m
*.physicalEnvironment.spaceMinY = 0m
*.physicalEnvironment.spaceMinZ = 0m
*.physicalEnvironment.spaceMaxX = 5000m
*.physicalEnvironment.spaceMaxY = 5000m
*.physicalEnvironment.spaceMaxZ = 200m

*.physicalEnvironment.config = xmldoc("obstacles.xml")

# ── Modelo de perda por obstáculo: dielétrico (atenuação parcial realista) ───
# concreto: ε_r=4,5, σ=0,01 S/m → ~0,24 dB/m @ 2,4 GHz.
# 3 blocos 300×300×120 m: travessia diagonal ≈ 102 dB — enlace bloqueado.
*.radioMedium.obstacleLoss.typename = "DielectricObstacleLoss"

# ── Visualização dos objetos físicos (Qtenv) ─────────────────────────────────
*.visualizer.physicalEnvironmentVisualizer.displayObjects      = true
*.visualizer.obstacleLossVisualizer.displayIntersections       = true
*.visualizer.obstacleLossVisualizer.intersectionLineColor      = "red"
*.visualizer.obstacleLossVisualizer.intersectionLineWidth      = 2

# ═══════════════════════════════════════════════════════════════════════════
# Cenario_Favoravel — limite superior de desempenho
# 20 UAVs, 8 equipes, alertInterval=80 s, sem obstáculos.
# k̄ ≈ 1,5 (20 UAVs, r≈788 m, 25 km²) — rede moderada, conectividade melhor.
# serviceTime=60 s (vs 120 s nos demais): reduz saturação das equipes para
# destacar o desempenho da rede em condições favoráveis.
# ═══════════════════════════════════════════════════════════════════════════
[Config Cenario_Favoravel]
extends     = BasicTest
description = "Favorável: 20 UAVs, 8 equipes, alertInterval=80 s — sem obstáculos"
*.numDrones = 20
*.numTeams  = 8
**.drone[*].app[0].victimInterval = 80s
**.team[*].app[0].serviceTime     = 60s
# 4 cantos + 4 meios de borda (8 equipes, 5 km × 5 km)
**.team[5].mobility.initialX              = 2500m   # N
**.team[5].mobility.initialY              = 4250m
**.team[6].mobility.initialX              = 2500m   # S
**.team[6].mobility.initialY              = 750m
**.team[7].mobility.initialX              = 750m    # W
**.team[7].mobility.initialY              = 2500m
**.team[5].app[0].myTeamId               = "team5"
**.team[6].app[0].myTeamId               = "team6"
**.team[7].app[0].myTeamId               = "team7"

# ═══════════════════════════════════════════════════════════════════════════
# Cenario_Intermediario — cenário principal com obstáculos moderados
# 15 UAVs, 5 equipes, alertInterval=40 s.
# ═══════════════════════════════════════════════════════════════════════════
[Config Cenario_Intermediario]
extends     = Cenario_ComObstaculos
description = "Intermediário: 15 UAVs, 5 equipes, alertInterval=40 s — obstáculos moderados"

# ═══════════════════════════════════════════════════════════════════════════
# Cenario_Degradado — forçar desconexões, store-forward e retransmissões
# 10 UAVs, 3 equipes, alertInterval=20 s, obstáculos.
# k̄ ≈ 0,4 (10 UAVs, r≈788 m, 25 km²) — rede fragmentada.
# ═══════════════════════════════════════════════════════════════════════════
[Config Cenario_Degradado]
extends     = Cenario_ComObstaculos
description = "Degradado: 10 UAVs, 3 equipes, alertInterval=20 s — rede fragmentada"
*.numDrones = 10
*.numTeams  = 3
**.drone[*].app[0].victimInterval = 20s
# 3 equipes: SW, NE, Centro
**.team[0].mobility.initialX              = 750m
**.team[0].mobility.initialY              = 4250m
**.team[1].mobility.initialX              = 4250m
**.team[1].mobility.initialY              = 750m
**.team[2].mobility.initialX              = 2500m
**.team[2].mobility.initialY              = 2500m
**.team[0].app[0].myTeamId               = "team0"
**.team[1].app[0].myTeamId               = "team1"
**.team[2].app[0].myTeamId               = "team2"

# ═══════════════════════════════════════════════════════════════════════════
# SmokeTest_Beacons — regressão: verifica que beacons chegam ao UAV.
#
# GATILHO: beaconJitter=0 aborta em cRuntimeError. Se jitter for reduzido
# acidentalmente, o log (INFO) mostrará ausência de entradas na tabela do drone.
#
# Topologia: 2 equipes estacionárias a ~50 m e ~70 m de 1 UAV estacionário.
# Com beaconJitter=sendInterval (default=1s), as transmissões são distribuídas
# no tempo → ambas recebidas. Resultado esperado: tabela com 2 entradas.
# ═══════════════════════════════════════════════════════════════════════════
[Config SmokeTest_Beacons]
extends        = BasicTest
description    = "Regressão: 1 UAV + 2 equipes estacionárias — verifica beacon recebido"
repeat         = 1
sim-time-limit = 15s
*.numDrones    = 1
*.numTeams     = 2
**.drone[0].mobility.typename  = "StationaryMobility"
**.drone[0].mobility.initialX  = 2500m
**.drone[0].mobility.initialY  = 2500m
**.drone[0].mobility.initialZ  = 100m
**.team[0].mobility.typename   = "StationaryMobility"
**.team[0].mobility.initialX   = 2550m
**.team[0].mobility.initialY   = 2500m
**.team[0].mobility.initialZ   = 1.5m
**.team[1].mobility.typename   = "StationaryMobility"
**.team[1].mobility.initialX   = 2500m
**.team[1].mobility.initialY   = 2570m
**.team[1].mobility.initialZ   = 1.5m
**.team[0].app[0].myTeamId     = "team0"
**.team[1].app[0].myTeamId     = "team1"
# beaconJitter usa o default (= sendInterval = 1s) — não sobrescrever aqui.
# Para testar o gatilho de falha: **.team[*].app[0].beaconJitter = 0s

# ═══════════════════════════════════════════════════════════════════════════
# BasicTest_Visual — visualização em Qtenv sem sobrecarga de overlays.
# Desabilita círculos de alcance e sinais; mantém trilhas de mobilidade.
# ═══════════════════════════════════════════════════════════════════════════
[Config BasicTest_Visual]
extends        = BasicTest
description    = "Qtenv: visualização reduzida — sem círculos de alcance, com trilhas de movimento"
sim-time-limit = 60s
repeat         = 1

*.visualizer.mediumVisualizer.displayCommunicationRanges  = false
*.visualizer.mediumVisualizer.displayInterferenceRanges   = false
*.visualizer.mediumVisualizer.displaySignals              = false
*.visualizer.mediumVisualizer.displayTransmissions        = false
*.visualizer.mediumVisualizer.displayReceptions           = false
# displayMovementTrails: rastro do caminho recente de cada nó (100 seções)
*.visualizer.mobilityVisualizer.displayMovementTrails     = true
*.visualizer.mobilityVisualizer.movementTrailLineColor    = "dark"
*.visualizer.mobilityVisualizer.movementTrailLineWidth    = 1
*.visualizer.mobilityVisualizer.displayVelocities         = false
