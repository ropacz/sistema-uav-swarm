[General]
sim-time-limit = 300s
repeat = 1
seed-set = ${repetition}

output-vector-file = results/${configname}-${runnumber}.vec
output-scalar-file  = results/${configname}-${runnumber}.sca
**.vector-recording = true
**.scalar-recording = true

**.mobility.initFromDisplayString = false

*.configurator.addStaticRoutes = false
*.configurator.addSubnetRoutes = false
*.configurator.addDefaultRoutes = false
**.ip.limitedBroadcast = true

**.radioMedium.typename                         = "Ieee80211ScalarRadioMedium"
**.radioMedium.pathLoss.typename                = "FreeSpacePathLoss"
**.radioMedium.backgroundNoise.typename         = "IsotropicScalarBackgroundNoise"
**.radioMedium.backgroundNoise.power            = -100dBm

**.wlan[*].radio.typename                       = "Ieee80211ScalarRadio"
**.wlan[*].radio.carrierFrequency               = 2.4GHz
**.wlan[*].radio.bandwidth                      = 20MHz
**.wlan[*].radio.receiver.sensitivity           = -85dBm
**.wlan[*].radio.receiver.snirThreshold         = 4dB

# Drones: rádio embarcado leve — padrão FANET (artigos omnet-manual/scitepress)
# 20 mW @ 2.4 GHz / FreeSpace → alcance teórico ~800 m
**.drone[*].wlan[*].radio.transmitter.power     = 20mW
**.drone[*].wlan[*].radio.transmitter.datarate  = 6Mbps

# Equipes terrestres: rádio portátil de campo (2,5× mais potente que drone)
# 50 mW → alcance ~1260 m  (rácio de raio ≈ 1,6×, menos discrepante)
**.team[*].wlan[*].radio.transmitter.power      = 50mW
**.team[*].wlan[*].radio.transmitter.datarate   = 6Mbps

**.wlan[*].mac.typename                         = "Ieee80211Mac"
**.wlan[*].mgmt.typename                        = "Ieee80211MgmtAdhoc"
**.wlan[*].agent.typename                       = ""
# Buffer MAC: 50 pacotes — previne overflow sem jitter excessivo [SCI-2019]
**.wlan[*].mac.queue.packetCapacity             = 50

# ═══════════════════════════════════════════════════════════════════════════
# BasicTest — 10 drones + 3 equipes
# Fluxo 1: equipes → TeamUpdate broadcast (a cada 5s)
#          drone   → armazena tabela local + envia DroneStatus (ACK unicast)
# Fluxo 2: drone detecta vítima → consulta tabela → VictimAlert unicast → equipe
# ═══════════════════════════════════════════════════════════════════════════
[Config BasicTest]
network     = echosar.simulations.BasicNetwork
description = "10 drones, 3 equipes: comunicação básica enxame ↔ equipes"
*.numDrones = 10
*.numTeams  = 3

**.drone[*].mobility.typename             = "GaussMarkovMobility"
# α=0.75 → inércia moderada, simula momentum sem voo completamente aleatório
**.drone[*].mobility.alpha                = 0.75
# Velocidade uniforme no intervalo da literatura FANET: 11–31 m/s [FEA-2024]
**.drone[*].mobility.speed                = uniform(11mps, 31mps)
**.drone[*].mobility.speedStdDev          = 0mps
**.drone[*].mobility.angleStdDev          = 30deg
**.drone[*].mobility.margin               = 50m
**.drone[*].mobility.constraintAreaMinX   = 0m
**.drone[*].mobility.constraintAreaMaxX   = 5000m
**.drone[*].mobility.constraintAreaMinY   = 0m
**.drone[*].mobility.constraintAreaMaxY   = 5000m
# Altitude: ótimo 120 m [SCI-2019]; faixa operacional 100–150 m
**.drone[*].mobility.constraintAreaMinZ   = 100m
**.drone[*].mobility.constraintAreaMaxZ   = 150m

# Parâmetros de aplicação alinhados à literatura
# victimInterval ~ 20 s: intervalo médio de detecção em varredura SAR
**.drone[*].app[0].victimInterval         = 20s
# teamTimeout = 30 s: alinhado ao timer Link State [SCI-2019]
**.drone[*].app[0].teamTimeout            = 30s

**.team[*].mobility.typename  = "StationaryMobility"
**.team[*].mobility.initialZ  = 1.5m
# Equipes triangulam a área de busca: SW, NE e SE
**.team[0].mobility.initialX  = 600m
**.team[0].mobility.initialY  = 4400m
**.team[1].mobility.initialX  = 4400m
**.team[1].mobility.initialY  = 600m
**.team[2].mobility.initialX  = 4400m
**.team[2].mobility.initialY  = 4400m

*.visualizer.mediumVisualizer.displayCommunicationRanges  = true
*.visualizer.mediumVisualizer.communicationRangeLineColor = "blue"
*.visualizer.mediumVisualizer.communicationRangeLineStyle = "dashed"
*.visualizer.mediumVisualizer.communicationRangeLineWidth = 1

**.team[0].app[0].myTeamId     = "team0"
**.team[1].app[0].myTeamId     = "team1"
**.team[2].app[0].myTeamId     = "team2"
# sendInterval = 5 s: beacon periódico das equipes para os drones
**.team[*].app[0].sendInterval = 5s
