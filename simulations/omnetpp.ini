[General]
sim-time-limit = 300s
repeat = 5
seed-set = ${repetition}

output-vector-file = results/${configname}-${runnumber}.vec
output-scalar-file  = results/${configname}-${runnumber}.sca
**.vector-recording = true
**.scalar-recording = true

**.mobility.initFromDisplayString = false

# ── Endereçamento e roteamento ───────────────────────────────────────────────
# AODV gerencia as rotas dinamicamente (sob demanda) — rotas estáticas/subnet/
# default DEVEM ficar desligadas. Todos os nós numa única sub-rede /24 para que
# o RREQ do AODV alcance os vizinhos e as rotas sejam resolvidas dentro da rede.
*.configurator.config = xml("<config><interface hosts='*' address='10.0.0.x' netmask='255.255.255.0'/></config>")
*.configurator.addStaticRoutes  = false
*.configurator.addSubnetRoutes  = false
*.configurator.addDefaultRoutes = false
**.ip.limitedBroadcast = true
# forwarding=true já vem do AdhocHost (base do AodvRouter) — habilita repasse IP multi-hop

# ── AODV (roteamento ad-hoc reativo) ─────────────────────────────────────────
# activeRouteTimeout: tempo que uma rota descoberta permanece válida sem uso.
# Em FANET com mobilidade alta, rotas envelhecem rápido — 5 s equilibra
# redescoberta (overhead de RREQ) com validade da rota.
**.aodv.activeRouteTimeout = 5s

**.radioMedium.typename                         = "Ieee80211ScalarRadioMedium"
**.radioMedium.pathLoss.typename                = "FreeSpacePathLoss"
**.radioMedium.backgroundNoise.typename         = "IsotropicScalarBackgroundNoise"
**.radioMedium.backgroundNoise.power            = -100dBm

**.wlan[*].radio.typename                       = "Ieee80211ScalarRadio"
# Todos os nós (UAVs, embarcações) usam IEEE 802.11 ad hoc, 2,4 GHz.
# O IEEE 802.11s é a referência conceitual de rede em malha; o protocolo de
# roteamento implementado no INET é AODV (AodvRouter), que opera sob demanda.
# Alcance nominal 300 m/salto calibrado a partir de [panda2019design]:
#   280 m para 802.11n e 290 m para 802.11ac em rede emergencial com UAVs.
**.wlan[*].radio.carrierFrequency               = 2.4GHz
**.wlan[*].radio.bandwidth                      = 20MHz
**.wlan[*].radio.receiver.sensitivity           = -85dBm
**.wlan[*].radio.receiver.snirThreshold         = 4dB

# 2,9 mW @ 2,4 GHz / FreeSpacePathLoss / −85 dBm → alcance máximo ≈ 300 m.
**.wlan[*].radio.transmitter.power              = 2.9mW
**.wlan[*].radio.transmitter.datarate           = 6Mbps

**.wlan[*].mac.typename                         = "Ieee80211Mac"
**.wlan[*].mgmt.typename                        = "Ieee80211MgmtAdhoc"
**.wlan[*].agent.typename                       = ""
# Buffer MAC: 50 pacotes — previne overflow sem jitter excessivo [SCI-2019]
**.wlan[*].mac.queue.packetCapacity             = 50

# ═══════════════════════════════════════════════════════════════════════════
# BasicTest — cenário base calibrado: 30 drones + 10 embarcações, área SAR 2 km × 2 km
#
# IEEE 802.11 ad hoc, 2,4 GHz; roteamento AODV (AodvRouter).
# Dimensionamento: k̄ = (N_d-1)·π·r²/A ≈ 2,0 para N_d=30, r=300 m, A=4×10⁶ m²
# (rede moderadamente esparsa — ~2 vizinhos UAV–UAV por drone em média).
# Alcance drone–equipe 3D: r_h = sqrt(300²-(100-1,5)²) ≈ 283 m no plano do solo.
#
# Drones: altitude 100 m constante, Gauss-Markov 8–15 m/s [garg2022directed].
# Embarcações: RandomWaypoint 1,5–3,0 m/s, Z=1,5 m (antena convés).
# Store-forward: maxRetries=5, janela 50 s — sem obstáculos, baseline.
#
# Fluxo 1: equipe  → TeamUpdate bcast 5001 → drone (tabela local + DroneStatus ACK)
# Fluxo 2: drone   → VictimAlert uni 5000  → equipe (direto ou via relay FANET)
#          relay   → VictimAlert bcast 5004 → drones vizinhos (c/ deduplicação)
#          equipe  → VictimAck uni 5002     → drone origem (cancela store-forward)
# ═══════════════════════════════════════════════════════════════════════════
[Config BasicTest]
network     = echosar.simulations.BasicNetwork
description = "30 drones, 10 equipes: cenário base calibrado — área 2 km × 2 km sem obstáculos"
*.numDrones = 30
*.numTeams  = 10

# ── Drones: mobilidade aérea suavizada ──────────────────────────────────────
**.drone[*].mobility.typename             = "GaussMarkovMobility"
**.drone[*].mobility.alpha                = 0.75   # inércia moderada (0=aleatorio, 1=linear)
**.drone[*].mobility.speed                = uniform(8mps, 15mps)
**.drone[*].mobility.speedStdDev          = 0mps
**.drone[*].mobility.angleStdDev          = 30deg
**.drone[*].mobility.margin               = 50m
**.drone[*].mobility.constraintAreaMinX   = 0m
**.drone[*].mobility.constraintAreaMaxX   = 2000m
**.drone[*].mobility.constraintAreaMinY   = 0m
**.drone[*].mobility.constraintAreaMaxY   = 2000m
# Altitude operacional constante: 100 m [garg2022directed]
**.drone[*].mobility.constraintAreaMinZ   = 100m
**.drone[*].mobility.constraintAreaMaxZ   = 100m

# ── Aplicação dos drones ─────────────────────────────────────────────────────
**.drone[*].app[0].victimInterval         = 40s
**.drone[*].app[0].teamTimeout            = 30s
**.drone[*].app[0].retryInterval          = 10s
**.drone[*].app[0].maxRetries             = 5

# ── Embarcações de resgate: patrulha em área inundada ────────────────────────
**.team[*].mobility.typename              = "RandomWaypointMobility"
**.team[*].mobility.speed                 = uniform(1.5mps, 3.0mps)
**.team[*].mobility.waitTime              = uniform(5s, 20s)
**.team[*].mobility.constraintAreaMinX    = 0m
**.team[*].mobility.constraintAreaMaxX    = 2000m
**.team[*].mobility.constraintAreaMinY    = 0m
**.team[*].mobility.constraintAreaMaxY    = 2000m
# Embarcação: Z constante em 1.5 m (altura da antena montada no convés)
**.team[*].mobility.initialZ              = 1.5m
**.team[*].mobility.constraintAreaMinZ    = 1.5m
**.team[*].mobility.constraintAreaMaxZ    = 1.5m
# Posições iniciais: 4 cantos + 4 meios de borda + centro + interior NE (área 2 km × 2 km)
**.team[0].mobility.initialX              = 300m    # SW
**.team[0].mobility.initialY              = 1700m
**.team[1].mobility.initialX              = 1700m   # NE
**.team[1].mobility.initialY              = 300m
**.team[2].mobility.initialX              = 1700m   # SE
**.team[2].mobility.initialY              = 1700m
**.team[3].mobility.initialX              = 300m    # NW
**.team[3].mobility.initialY              = 300m
**.team[4].mobility.initialX              = 1000m   # Centro
**.team[4].mobility.initialY              = 1000m
**.team[5].mobility.initialX              = 1000m   # N
**.team[5].mobility.initialY              = 1700m
**.team[6].mobility.initialX              = 1000m   # S
**.team[6].mobility.initialY              = 300m
**.team[7].mobility.initialX              = 300m    # W
**.team[7].mobility.initialY              = 1000m
**.team[8].mobility.initialX              = 1700m   # E
**.team[8].mobility.initialY              = 1000m
**.team[9].mobility.initialX              = 1350m   # Interior NE
**.team[9].mobility.initialY              = 1350m

# ── Visualização ─────────────────────────────────────────────────────────────
*.visualizer.mediumVisualizer.displayCommunicationRanges  = true
*.visualizer.mediumVisualizer.communicationRangeLineColor = "blue"
*.visualizer.mediumVisualizer.communicationRangeLineStyle = "dashed"
*.visualizer.mediumVisualizer.communicationRangeLineWidth = 1

# ── Aplicação das equipes ────────────────────────────────────────────────────
**.team[0].app[0].myTeamId                = "team0"
**.team[1].app[0].myTeamId                = "team1"
**.team[2].app[0].myTeamId                = "team2"
**.team[3].app[0].myTeamId                = "team3"
**.team[4].app[0].myTeamId                = "team4"
**.team[5].app[0].myTeamId                = "team5"
**.team[6].app[0].myTeamId                = "team6"
**.team[7].app[0].myTeamId                = "team7"
**.team[8].app[0].myTeamId                = "team8"
**.team[9].app[0].myTeamId                = "team9"
**.team[*].app[0].sendInterval            = 5s    # beacon periódico para os drones
# teamSpeed: ponto médio da faixa de embarcação (1.5–3.0 m/s → 2.25 m/s)
# Usado para estimar busyDuration no timer de atendimento
**.team[*].app[0].teamSpeed               = 2.25mps
# serviceTime: tempo mínimo de triagem e estabilização no local da vítima
**.team[*].app[0].serviceTime             = 120s

# ═══════════════════════════════════════════════════════════════════════════
# BasicTest_Obstacles — cenário com 3 edifícios de concreto (obstáculos urbanos).
#
# Usa DielectricObstacleLoss: atenua o sinal com base no comprimento do caminho
# dentro do material e nas propriedades dielétricas do concreto (ε_r=4,5,
# σ=0,01 S/m). A atenuação é proporcional à espessura do material atravessado
# — mais realista que o modelo ideal (bloqueio binário).
#
# Os 3 edifícios (obstacles.xml) têm 120 m de altura e estão posicionados para
# interceptar caminhos drone-embarcação na área de 2 km × 2 km.
#
# physicalEnvironmentModule: o RadioMedium procura automaticamente um submodule
# chamado "physicalEnvironment" no mesmo network — corresponde ao módulo adicionado
# ao BasicNetwork.ned.
# ═══════════════════════════════════════════════════════════════════════════
[Config BasicTest_Obstacles]
extends     = BasicTest
description = "30 drones, 10 equipes, 3 edifícios de concreto (120 m) — área 2 km × 2 km"

# ── Limites do espaço físico ─────────────────────────────────────────────────
*.physicalEnvironment.spaceMinX = 0m
*.physicalEnvironment.spaceMinY = 0m
*.physicalEnvironment.spaceMinZ = 0m
*.physicalEnvironment.spaceMaxX = 2000m
*.physicalEnvironment.spaceMaxY = 2000m
*.physicalEnvironment.spaceMaxZ = 200m

# ── Obstáculos próximos das equipes (obstacles.xml): ─────────────────────────
#   Obs-A centro (300, 1200) → ~141 m de team0 (SW  200,1300)
#   Obs-B centro (850, 850)  → ~141 m de team4 (Ctr 750,750)
#   Obs-C centro (1200, 1200)→ ~141 m de team2 (SE 1300,1300)
# Altura 120 m > altitude dos drones (100 m) → qualquer cruzamento bloqueia.
*.physicalEnvironment.config = xmldoc("obstacles.xml")

# ── Modelo de perda por obstáculo: dielétrico (atenuação parcial realista) ─
*.radioMedium.obstacleLoss.typename = "DielectricObstacleLoss"

# ── Visualização dos objetos físicos e interseções de sinal (Qtenv) ────────
# displayObjects: renderiza os edifícios como blocos 2-D no canvas
# displayIntersections: desenha linha vermelha no trecho do sinal dentro do edifício
*.visualizer.physicalEnvironmentVisualizer.displayObjects      = true
*.visualizer.obstacleLossVisualizer.displayIntersections       = true
*.visualizer.obstacleLossVisualizer.intersectionLineColor      = "red"
*.visualizer.obstacleLossVisualizer.intersectionLineWidth      = 2

# ═══════════════════════════════════════════════════════════════════════════
# BasicTest_TeamCal — TESTADO, NÃO ADOTADO (ver docs/scenario_reference.md §12.1).
# teamSpeed mais conservador (uniform 0.4-0.7) e serviceTime mais realista
# (300s) para triagem em inundação. PDR caiu 27,0%→18,4% em 5 seeds, mas a
# queda é errática por seed (não uniforme) — consistente com viés de RNG
# introduzido por trocar teamSpeed de escalar fixo p/ distribuição (consome
# sorteio extra do stream global, descorrelaciona toda a sequência de
# eventos do run em relação ao baseline de mesma seed), não com efeito
# causal real do parâmetro. Mantido aqui só como registro do teste.
# ═══════════════════════════════════════════════════════════════════════════
[Config BasicTest_TeamCal]
extends     = BasicTest
description = "[NÃO ADOTADO] BasicTest com teamSpeed=uniform(0.4,0.7) e serviceTime=300s"
**.team[*].app[0].teamSpeed    = uniform(0.4mps, 0.7mps)
**.team[*].app[0].serviceTime  = 300s

# ═══════════════════════════════════════════════════════════════════════════
# BasicTest_600s — TESTADO, NÃO ADOTADO COMO PRINCIPAL (ver §12.1). Dobra o
# tempo de simulação; reduz o desvio entre seeds (±3,7 vs ±7,3) mas não
# melhora o PDR (24,3% vs 27,0%) — sistema é limitado por capacidade, não
# por tempo de exposição. Pode valer a pena revisitar se precisarmos de
# menor variância entre seeds, mas dobra o custo computacional por seed.
# ═══════════════════════════════════════════════════════════════════════════
[Config BasicTest_600s]
extends         = BasicTest
description     = "[NÃO ADOTADO COMO PRINCIPAL] BasicTest com sim-time-limit=600s"
sim-time-limit  = 600s

# ═══════════════════════════════════════════════════════════════════════════
# BasicTest_1500m — comparação de área: mesmos 30 drones, área 1,5 km × 1,5 km
# k̄ = (30-1)·π·300²/2,25×10⁶ ≈ 3,6  (rede bem conectada)
# ═══════════════════════════════════════════════════════════════════════════
[Config BasicTest_1500m]
extends     = BasicTest
description = "Comparação: 30 drones, 10 equipes — área 1,5 km × 1,5 km (k̄≈3,6)"
**.drone[*].mobility.constraintAreaMaxX   = 1500m
**.drone[*].mobility.constraintAreaMaxY   = 1500m
**.team[*].mobility.constraintAreaMaxX    = 1500m
**.team[*].mobility.constraintAreaMaxY    = 1500m
**.team[0].mobility.initialX              = 200m    # SW
**.team[0].mobility.initialY              = 1300m
**.team[1].mobility.initialX              = 1300m   # NE
**.team[1].mobility.initialY              = 200m
**.team[2].mobility.initialX              = 1300m   # SE
**.team[2].mobility.initialY              = 1300m
**.team[3].mobility.initialX              = 200m    # NW
**.team[3].mobility.initialY              = 200m
**.team[4].mobility.initialX              = 750m    # Centro
**.team[4].mobility.initialY              = 750m
**.team[5].mobility.initialX              = 750m    # N
**.team[5].mobility.initialY              = 1300m
**.team[6].mobility.initialX              = 750m    # S
**.team[6].mobility.initialY              = 200m
**.team[7].mobility.initialX              = 200m    # W
**.team[7].mobility.initialY              = 750m
**.team[8].mobility.initialX              = 1300m   # E
**.team[8].mobility.initialY              = 750m
**.team[9].mobility.initialX              = 1050m   # Interior NE
**.team[9].mobility.initialY              = 1050m

# ═══════════════════════════════════════════════════════════════════════════
# SmokeTest_Beacons — regressão: verifica que TeamUpdate chega ao drone.
#
# GATILHO: se alguém zerar beaconJitter (= 0), a simulação aborta com
# cRuntimeError em SimpleTeamApp::initialize(). Se alguém reduzir o jitter
# acidentalmente de outra forma, este teste detecta pela ausência de
# [DRONE.*tabela] no log (executar com --cmdenv-log-level=INFO).
#
# Topologia: 2 equipes estacionárias a ~110 m e ~150 m de 1 drone estacionário.
# Com beaconJitter=sendInterval (default), as 2 equipes transmitem em momentos
# distintos → ambas são recebidas. Com jitter=0 a simulação aborta antes de
# chegar aqui. Resultado esperado (300 s): tabela do drone com 2 entradas.
# ═══════════════════════════════════════════════════════════════════════════
[Config SmokeTest_Beacons]
extends     = BasicTest
description = "Regressão: 1 drone + 2 equipes estacionárias — verifica TeamUpdate recebido"
repeat      = 1
sim-time-limit = 15s
*.numDrones = 1
*.numTeams  = 2
**.drone[0].mobility.typename  = "StationaryMobility"
**.drone[0].mobility.initialX  = 500m
**.drone[0].mobility.initialY  = 500m
**.drone[0].mobility.initialZ  = 100m
**.team[0].mobility.typename   = "StationaryMobility"
**.team[0].mobility.initialX   = 550m
**.team[0].mobility.initialY   = 500m
**.team[0].mobility.initialZ   = 1.5m
**.team[1].mobility.typename   = "StationaryMobility"
**.team[1].mobility.initialX   = 500m
**.team[1].mobility.initialY   = 570m
**.team[1].mobility.initialZ   = 1.5m
**.team[0].app[0].myTeamId     = "team0"
**.team[1].app[0].myTeamId     = "team1"
# beaconJitter usa o default (= sendInterval) — não sobrescrever aqui.
# Para testar o gatilho de falha, adicione: **.team[*].app[0].beaconJitter = 0s

# ═══════════════════════════════════════════════════════════════════════════
# BasicTest_Visual — visualização em Qtenv sem sobrecarga de círculos.
#
# Com 30 drones + 10 equipes, displayCommunicationRanges gera 40 círculos
# sobrepostos que não adicionam informação e poluem a tela. Esta config
# desabilita os overlays de rádio e mantém apenas as trilhas de mobilidade,
# adequada para capturas de tela na dissertação.
#
# Para ver só um nó (ex: drone[0]):
#   **.drone[0].wlan[0].radio.displayCommunicationRange = true
# ═══════════════════════════════════════════════════════════════════════════
[Config BasicTest_Visual]
extends     = BasicTest
description = "BasicTest com visualização reduzida para Qtenv — sem círculos de alcance"
sim-time-limit = 60s
repeat      = 1

*.visualizer.mediumVisualizer.displayCommunicationRanges  = false
*.visualizer.mediumVisualizer.displayInterferenceRanges   = false
*.visualizer.mediumVisualizer.displaySignals              = false
*.visualizer.mediumVisualizer.displayTransmissions        = false
*.visualizer.mediumVisualizer.displayReceptions           = false
*.visualizer.mobilityVisualizer.displayMovements          = true
*.visualizer.mobilityVisualizer.displayVelocities         = false
*.visualizer.networkNodeVisualizer.displayModuleNames     = false

